<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/style.css">
    <title> Generador de paleta </title>
    <script src="colorcounter.js"></script>
</head>

<body>
    <main>
        <h1> Generador de paleta </h1>

        <p> Cantidad de colores </p>
        <select id="BoxQuantity">
            <option value="-1"> Seleccione un valor </option>
            <option value="6"> 6 </option>
            <option value="8"> 8 </option>
            <option value="9"> 9 </option>
        </select>

        <p> Hacer click para generar colores aleatorios </p>
        <button id="generateColors" onclick="generateColors()"> Generar Paleta </button>

        <p id="colorTypeText" style="display: none"> Hacer click para cambiar el formato entre HEX/HSL </p>
        <button id="colorType" onclick="toggleColorType()" style="display: none"> Cambiar a HSL </button>

        <footer>
            <small> &copy;Todos los derechos reservados a Colorfly Studio. </small>
        </footer>
    </main>

    <aside id="colorsShown">
        <div id="colors">
            <div class="colorBox" id="colorBox1"></div>
            <div class="colorBox" id="colorBox2"></div>
            <div class="colorBox" id="colorBox3"></div>
            <div class="colorBox" id="colorBox4"></div>
            <div class="colorBox" id="colorBox5"></div>
            <div class="colorBox" id="colorBox6"></div>
            <div class="colorBox" id="colorBox7"></div>
            <div class="colorBox" id="colorBox8"></div>
            <div class="colorBox" id="colorBox9"></div>
        </div>
        <div id="toast"> ¡Paleta generada exitosamente! </div>
    </aside>
</body>
</html>
